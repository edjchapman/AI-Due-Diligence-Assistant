version: 2
updates:
  # npm dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
    ignore:
      # @types/node tracks the runtime — keep it on the Node major we pin (24),
      # not ahead of it. Bump manually when the Node version moves.
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
    groups:
      # One PR for routine minor/patch bumps to keep noise down.
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used in workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
